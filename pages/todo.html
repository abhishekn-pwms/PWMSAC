<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDos AC v1.2 - REMV ACTVTY</title>
    <link rel="stylesheet" href="../css/pwms.css">
</head>
<body>

    <div class="app-layout">

        <div id="header"></div>

        <div class="app-body-container">

            <div id="sidebar"></div>

            <div id="content">

                <div class="page-header">
                    <div class="page-title">ToDos AC v1.2 - REMV ACTVTY</div>
                    <button class="btn btn-primary hide-on-mobile" onclick="newTodo()">+ New ToDo</button>
                </div>

                <div class="toolbar">
                    <input type="search" id="searchText" class="search-box" placeholder="Search ToDo..." onkeyup="refreshTodoView()">
                    <select id="statusFilter" onchange="refreshTodoView()">
                        <option value="Open" selected>Open</option>
                        <option value="Completed">Completed</option>
                        <option value="All">All</option>
                    </select>
                    <select id="milestoneFilter" onchange="refreshTodoView()">
                        <option value="All">All Milestones</option>
                    </select>
                </div>

                <div class="stat-strip">
                    <div id="totalOpen" class="stat-chip">Open: 0</div>
                    <div id="totalCompleted" class="stat-chip">Completed: 0</div>
                    <div id="totalOverdue" class="stat-chip">Overdue: 0</div>
                </div>

                <div id="todoFeed"></div>

            </div>
        </div>
        <div id="footer"></div>

    </div>

    <div id="todoModal" class="modal">
        <div class="modal-content">
            <h2>ToDo AC</h2>
            <input type="hidden" id="todoId">

            <div class="form-row">
<!--
                <label>ToDo</label>
-->
                <input id="todoText" maxlength="200">
            </div>

            <div class="time-row">
                <div>
                    <label>Due Date</label>
                    <input type="date" id="dueDate">
                </div>
                <div>
                    <label>Status</label>
                    <select id="todoStatus">
                        <option value="Open">Open</option>
                        <option value="Completed">Completed</option>
                    </select>
                </div>
            </div>


            <div class="form-row">
                <label>Milestone</label>
                <div class="activity-picker-row">
                    <select id="milestoneId" onchange="milestoneChanged()"></select>
                    <input type="search" id="milestoneSearch" placeholder="Filter milestones..." onkeyup="filterMilestones()">
                </div>
            </div>

            <div class="form-row">
                <label>Context</label>
                <div class="activity-context-box" id="milestoneContext">Standalone Action</div>
            </div>



            <div id="newMilestoneSection" class="inline-create-box" style="display:none;">
                <div class="inline-create-title">New Milestone</div>
                <div class="time-row">
                    <div>
                        <label>Milestone Name</label>
                        <input id="newMilestoneName">
                    </div>
                    <div>
                        <label>Project</label>
                        <select id="newMilestoneProject"></select>
                    </div>
                </div>
                <div class="time-row" style="margin-bottom:0;">
                    <div>
                        <label>Target Date</label>
                        <input type="date" id="newMilestoneTargetDate">
                    </div>
                    <div>
                        <label>Status</label>
                        <select id="newMilestoneStatus">
                            <option value="Open">Open</option>
                            <option value="Completed">Completed</option>
                        </select>
                    </div>
                </div>
            </div>



            <div class="form-row">
                <label>Notes</label>
                <textarea id="notes" style="min-height: 30px; min-width: stretch; height: 50px;" rows="2" maxlength="1000"></textarea>
            </div>

            <div class="modal-actions">
                <button class="btn btn-primary" onclick="saveTodo()">Save</button>
                <button class="btn btn-secondary" onclick="closeModal('todoModal')">Cancel</button>
                <button id="deleteTodoButton" class="btn btn-danger" onclick="deleteCurrentTodo()" style="display:none; margin-left:auto;" title="Delete">
                    &#128465;&#65039;
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/config.js"></script>
    <script src="../js/supabase.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/navigation.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/masters.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/todo.js"></script>

    <script>initializeAppIcon();</script>

    <!--
    v1.1g4 NEW FAB - ADAPTIVE QUICK-ACTION & NAVIGATION HUB
    -->
    <div class="fab-container" id="universalFab">
        <button class="fab-trigger" onclick="toggleUniversalFab(event)">＋</button>
        <div class="fab-options">
            
            <div class="fab-section-header">📋 Master Tables</div>
            <div class="fab-row-grid section-one">
                <a href="portfolio.html" class="fab-sub-btn">💼 Portfolios</a>
                <a href="project.html" class="fab-sub-btn">🚀 Projects</a>
                <a href="milestone.html" class="fab-sub-btn">🎯 Milestones</a>

<!--
## REMOVING ACTIVITY LINK
-->
<!--
                <a href="activity.html" class="fab-sub-btn">⚡ Activities</a>
-->

            </div>

            <div class="fab-section-header">📋 Core Data</div>
            <div class="fab-row-grid section-two-three-four">
                <a href="todo.html" class="fab-sub-btn active-page-indicator">✔️ ToDos</a>
                <a href="task-log.html" class="fab-sub-btn">🕒 Task Logs</a>
            </div>

            <div class="fab-section-header">🏠 Quick Nav</div>
            <div class="fab-row-grid section-two-three-four">
                <a href="review.html" class="fab-sub-btn">📊 Reviews</a>
                <a href="dashboard.html" class="fab-sub-btn">🏠 Dashboard</a>
            </div>

            <div class="fab-section-header">🔥 Accelerators</div>
            <div class="fab-row-grid section-two-three-four">
                <button class="fab-sub-btn fab-accent-action" onclick="handleFabQuickAction('todo.html', 'newTodo')">📝 + ToDo</button>
                <button class="fab-sub-btn fab-accent-action" onclick="handleFabQuickAction('task-log.html', 'newTaskLog')">⏱️ + Task</button>
            </div>

        </div>
    </div>

</body>
</html>
