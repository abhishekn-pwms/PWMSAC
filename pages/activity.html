<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activities AC v1.3 Pass 4 CMNFAB</title>
    <link rel="stylesheet" href="../css/pwms.css">
</head>
<body>

    <div class="app-layout">

        <div id="header"></div>

        <div class="app-body-container">

            <div id="sidebar"></div>

            <div id="content">

                <div class="page-header">
                    <div class="page-title">Activities AC v1.3</div>
                    <button class="btn btn-primary" onclick="newActivity()">+ New Activity</button>
                </div>

                <div class="toolbar">
                    <input type="search" id="searchText" class="search-box" placeholder="Search Activity..." onkeyup="renderActivityGrid()">
                </div>

                <div class="toolbar-secondary">
                    <select id="statusFilter" onchange="renderActivityGrid()">
                        <option value="Enabled" selected>Enabled</option>
                        <option value="Disabled">Disabled</option>
                        <option value="All">All</option>
                    </select>
                    <select id="activityStatusFilter" onchange="renderActivityGrid()"></select>
                    <select id="activityPriorityFilter" onchange="renderActivityGrid()"></select>
                </div>

                <div class="stat-strip">
                    <div id="activityCount" class="stat-chip"></div>
                </div>

                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Activity</th>
                                <th>Context</th>
                                <th>Target Date</th>
                                <th>Priority</th>
                                <th>Status</th>
                                <th>Enabled</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="activityGrid"></tbody>
                    </table>
                </div>

            </div>

        </div>
        <div id="footer"></div>

    </div>

    <div id="activityModal" class="modal">
        <div class="modal-content">
            <h2>Activity</h2>
            <input type="hidden" id="activityId">

            <div class="form-row">
                <label>Milestone</label>
                <select id="milestoneId"></select>
            </div>

            <div class="form-row">
                <label>Activity Name</label>
                <input id="activityName">
            </div>

            <div class="form-row">
                <label>Description</label>
                <textarea id="description" style="min-height: 30px; min-width: stretch; height: 40px;" rows="2" maxlength="200"></textarea>
            </div>

            <div class="time-row">
                <div>
                    <label>Target Date</label>
                    <input type="date" id="targetDate">
                </div>
                <div>
                    <label>Priority</label>
                    <select id="activityPriority"></select>
                </div>
            </div>

            <div class="time-row">
                <div>
                    <label>Status</label>
                    <select id="activityStatus"></select>
                </div>
                <div>
                    <label>Display Order</label>
                    <input type="number" id="displayOrder" value="100">
                </div>
            </div>

            <div class="checkbox-row">
                <input type="checkbox" id="enabled" checked>
                <label>Enabled?</label>
            </div>

            <div class="modal-actions">
                <button class="btn btn-primary" onclick="saveActivity()">Save</button>
                <button class="btn btn-secondary" onclick="closeModal('activityModal')">Cancel</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/config.js"></script>
    <script src="../js/supabase.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/navigation.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/masters.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/activity.js"></script>

    <script>initializeAppIcon();</script>

    <!-- v1.3 PASS 4 COMMON FAB IMPLEMENTED -->
    <div id="fab"></div>

</body>
</html>
