<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milestones AC v1.1g4</title>
    <link rel="stylesheet" href="../css/pwms.css">
</head>
<body>

    <div class="app-layout">

        <div id="header"></div>

        <div class="app-body-container">

            <div id="sidebar"></div>

            <div id="content">

                <div class="page-header">
                    <div class="page-title">Milestones AC v1.1g4</div>
                    <button class="btn btn-primary" onclick="newMilestone()">+ New Milestone</button>
                </div>

                <div class="toolbar">
                    <input type="search" id="searchText" class="search-box" placeholder="Search Milestone..." onkeyup="renderMilestoneGrid()">
                </div>

                <div class="toolbar-secondary">
                    <select id="statusFilter" onchange="renderMilestoneGrid()">
                        <option value="Enabled" selected>Enabled</option>
                        <option value="Disabled">Disabled</option>
                        <option value="All">All</option>
                    </select>
                    <select id="milestoneStatusFilter" onchange="renderMilestoneGrid()"></select>
                </div>

                <div class="stat-strip">
                    <div id="milestoneCount" class="stat-chip"></div>
                </div>

                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Code</th>
                                <th>Milestone</th>
                                <th>Project</th>
                                <th>Portfolio</th>
                                <th>Status</th>
                                <th>Start Date</th>
                                <th>Target Date</th>
                                <th>Enabled</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="milestoneGrid"></tbody>
                    </table>
                </div>

            </div>

        </div>
        <div id="footer"></div>

    </div>

    <div id="milestoneModal" class="modal">
        <div class="modal-content">
            <h2>Milestone</h2>
            <input type="hidden" id="milestoneId">

            <div class="form-row">
                <label>Project</label>
                <select id="projectId"></select>
            </div>

            <div class="time-row">
                <div>
                    <label>Milestone Code</label>
                    <input id="milestoneCode">
                </div>
                <div>
                    <label>Milestone Name</label>
                    <input id="milestoneName">
                </div>
            </div>

            <div class="desc-date-row">
                <div>
                    <label>Description</label>
                    <textarea id="description" style="min-height: 30px; min-width: stretch; height: 50px;" rows="2" maxlength="200"></textarea>
                </div>
                <div>
                    <label>Status</label>
                    <select id="milestoneStatus"></select>
                </div>
            </div>

            <div class="time-row">
                <div>
                    <label>Start Date</label>
                    <input type="date" id="startDate">
                </div>
                <div>
                    <label>Target Date</label>
                    <input type="date" id="targetDate">
                </div>
            </div>

            <div class="checkbox-row">
                <input type="checkbox" id="enabled" checked>
                <label>Enabled?</label>
            </div>

            <div class="modal-actions">
                <button class="btn btn-primary" onclick="saveMilestone()">Save</button>
                <button class="btn btn-secondary" onclick="closeModal('milestoneModal')">Cancel</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/config.js"></script>
    <script src="../js/supabase.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/navigation.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/masters.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/milestone.js"></script>

    <script>initializeAppIcon();</script>

    <!--
    v1.1g4 NEW FAB - ADAPTIVE QUICK-ACTION & NAVIGATION HUB
    -->
    <div class="fab-container" id="universalFab">
        <button class="fab-trigger" onclick="toggleUniversalFab(event)">＋</button>
        <div class="fab-options">
            
            <div class="fab-section-header">📋 Master Tables</div>
            <div class="fab-row-grid section-one">
                <a href="portfolio.html" class="fab-sub-btn">💼 Portfolios</a>
                <a href="project.html" class="fab-sub-btn">🚀 Projects</a>
                <a href="milestone.html" class="fab-sub-btn active-page-indicator">🎯 Milestones</a>

<!--
## REMOVING ACTIVITY LINK
-->
<!--
                <a href="activity.html" class="fab-sub-btn">⚡ Activities</a>
-->
                
            </div>

            <div class="fab-section-header">📋 Core Data</div>
            <div class="fab-row-grid section-two-three-four">
                <a href="todo.html" class="fab-sub-btn">✔️ ToDos</a>
                <a href="task-log.html" class="fab-sub-btn">🕒 Task Logs</a>
            </div>

            <div class="fab-section-header">🏠 Quick Nav</div>
            <div class="fab-row-grid section-two-three-four">
                <a href="review.html" class="fab-sub-btn">📊 Reviews</a>
                <a href="dashboard.html" class="fab-sub-btn">🏠 Dashboard</a>
            </div>

            <div class="fab-section-header">🔥 Accelerators</div>
            <div class="fab-row-grid section-two-three-four">
                <button class="fab-sub-btn fab-accent-action" onclick="handleFabQuickAction('todo.html', 'newTodo')">📝 + ToDo</button>
                <button class="fab-sub-btn fab-accent-action" onclick="handleFabQuickAction('task-log.html', 'newTaskLog')">⏱️ + Task</button>
            </div>

        </div>
    </div>

</body>
</html>
