<!-- AC v1.6 TODO NOTES -->

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard AC v1.6 TODONOTES</title>
    <link rel="stylesheet" href="../css/pwms.css">
</head>
<body>

    <div class="app-layout">
        <div id="header"></div>

        <div class="app-body-container">
            <div id="sidebar"></div>

            <div id="content">

                <div class="page-header">
                    <div class="page-title">Operational Cockpit AC v1.6</div>
                    <div class="page-header-actions">
                        <button id="focusToggleBtn" class="btn btn-focus" onclick="toggleDashboardFocusMode()">🎯 Focus Mode</button>

<!-- REMOVING ACCELERATORS FROM TOP ROW  -->
<!--
                        <button class="btn btn-primary hide-on-mobile" onclick="window.location.href='task-log.html?action=new'">+ Log Time</button>
                        <button class="btn btn-secondary hide-on-mobile" onclick="window.location.href='todo.html?action=new'">+ ToDo</button>
-->

                        <button class="btn btn-secondary" onclick="refreshFocusDashboard()" title="Refresh">🔄</button>
                    </div>
                </div>

                <div class="dashboard-summary-row">
                    <div class="dashboard-summary-card">
                        <div class="summary-label">Hours Today</div>
                        <div class="summary-value" id="summaryToday">0.0h</div>
                    </div>
                    <div class="dashboard-summary-card">
                        <div class="summary-label">Open ToDos</div>
                        <div class="summary-value" id="summaryTodos">0</div>
                    </div>
                    <div class="dashboard-summary-card">
                        <div class="summary-label">Active Milestones</div>
                        <div class="summary-value" id="summaryMilestones">0</div>
                    </div>
                </div>

                <div class="dashboard-grid">

                    <div class="focus-section">
                        <div class="focus-section-header">
                            <span>Target Milestone Runway</span>
                            <span id="countMilestones" class="dashboard-badge badge-neutral">0</span>
                        </div>
                        <div id="milestoneSummaryBar" class="milestone-summary-bar"></div>
                        <div id="milestoneRunway" class="compact-stream"></div>
                    </div>

                    <div class="focus-section">
                        <div class="focus-section-header">
                            <span>Daily Action Desk</span>
                            <span id="countTodos" class="dashboard-badge badge-alert">0</span>
                        </div>
                        <div id="todoActionDesk" class="compact-stream"></div>
                    </div>

                </div>
            </div>
        </div>
        <div id="footer"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/config.js"></script>
    <script src="../js/supabase.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/navigation.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/dashboard.js"></script>
    <script>initializeAppIcon();</script>

    <!-- v1.3 PASS 4 COMMON FAB IMPLEMENTED -->
    <div id="fab"></div>

</body>
</html>
