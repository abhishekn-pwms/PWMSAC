<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Log AC</title>
    <link rel="stylesheet" href="../css/pwms.css">
</head>
<body>

    <div class="app-layout">

        <div id="header"></div>

        <div class="app-body-container">

            <div id="sidebar"></div>

            <div id="content">

                <div class="page-header">
                    <div class="page-title">Task Log AC</div>
                    <button class="btn btn-primary hide-on-mobile" onclick="newTaskLog()">+ New Task Log</button>
                </div>

                <div class="toolbar">
                    <input type="search" id="searchText" class="search-box"
                        placeholder="Search task description..." onkeyup="refreshTaskLogView()">
                    <select id="periodFilter" onchange="applyPeriodFilter()">
                        <option value="Today">Today</option>
                        <option value="This Week">This Week</option>
                        <option value="This Month">This Month</option>
                        <option value="All">All</option>
                    </select>
                </div>

                <div class="toolbar-secondary">
                    <label style="width:30px; max-width: 30px; min-width: 10px;">From:&nbsp;</label>
                    <input style="width:20px; max-width: 25px;" type="date" id="fromDate" onchange="refreshTaskLogView()">
                    <label style="width:25px; max-width: 30px; min-width: 15px; text-align: right; display: flow;">To:&nbsp;</label>
                    <input style="width:20px; max-width: 25px;" type="date" id="toDate" onchange="refreshTaskLogView()">
                    <label style="width:50px; max-width: 30px; min-width: 15px;">&nbsp;&nbsp;&nbsp;</label>
                    <select style="min-width: 25%;" id="activityStatusFilter" onchange="refreshTaskLogView()"></select>
                </div>

                <div class="stat-strip">
                    <div id="totalRecords" class="stat-chip">Total Records: 0</div>
                    <div id="totalMinutes" class="stat-chip">Total Minutes: 0</div>
                    <div id="totalHours" class="stat-chip">Total Hours: 0.0</div>
                </div>

                <div id="taskLogFeed"></div>

            </div>
        </div>
        <div id="footer"></div>

    </div>

    <div id="taskLogModal" class="modal">
        <div class="modal-content">
            <h2>Task Log AC</h2>
            <input type="hidden" id="taskLogId">

            <div class="desc-date-row">
                <div>
                    <label>Task Description</label>

                    <textarea style="min-height: 30px; min-width: stretch;" id="taskDescription" rows="2" maxlength="1000"></textarea>
                </div>
                <div>
                    <label>Date</label>
                    <input type="date" id="taskDate">
                    <small style="text-align: right; display: flex;" class="field-hint" id="charCount">0 / 1000</small>
                </div>
            </div>

            <div class="form-row">
                <label>Activity</label>
                <div class="activity-picker-row">
                    <select id="activityId" onchange="activityChanged()"></select>
                    <input type="search" id="activitySearch" placeholder="Filter activities..." onkeyup="filterActivities()">
                </div>
            </div>

            <div class="form-row">
                <label>Context</label>
                <div class="activity-context-box" id="activityContext">Select Activity</div>
            </div>

            <div id="newActivitySection" class="inline-create-box" style="display:none;">
                <div class="inline-create-title">New Activity</div>
                <div class="time-row">
                    <div>
                        <label>Activity Name</label>
                        <input id="newActivityName">
                    </div>
                    <div>
                        <label>Milestone</label>
                        <select id="newActivityMilestone"></select>
                    </div>
                </div>
                <div class="time-row" style="margin-bottom:0;">
                    <div>
                        <label>Target Date</label>
                        <input type="date" id="newActivityTargetDate">
                    </div>
                    <div>
                        <label>Priority</label>
                        <select id="newActivityPriority"></select>
                    </div>
                </div>
            </div>

            <div class="form-row">
                <div class="time-fields-row">
                    <div class="field-group">
                        <label>Start</label>
                        <input type="time" id="startTime" onchange="calculateTimeFields()">
                    </div>
                    <div class="field-group">
                        <label>Minutes</label>
                        <input type="number" id="minutesSpent" min="0" value="0" onchange="calculateTimeFields()">
                    </div>
                    <div class="field-group">
                        <label>End</label>
                        <input type="time" id="endTime" onchange="calculateTimeFields()">
                    </div>
                </div>
            </div>

            <details id="taskLogOptional" class="optional-section">
                <summary>Additional Details</summary>
                <div class="optional-content">
                    <div class="checkbox-row">
                        <input type="checkbox" id="markActivityCompleted">
                        <label>Mark Activity Completed?</label>
                    </div>
                </div>
            </details>

            <div class="modal-actions">
                <button class="btn btn-primary" onclick="saveTaskLog()">Save</button>
                <button class="btn btn-secondary" onclick="closeModal('taskLogModal')">Cancel</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/config.js"></script>
    <script src="../js/supabase.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/navigation.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/masters.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/task-log.js"></script>

    <script>initializeAppIcon();</script>

    <button class="fab-btn" title="Log New Task" onclick="newTaskLog()">+</button>

</body>
</html>
