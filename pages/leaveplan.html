<!-- AC v1.7 DB BACKUP/EXPORT AND ATTENDANCE -->

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leave Plan AC v1.7 DBBCKUPNEXPONATT</title>
    <link rel="stylesheet" href="../css/pwms.css">
    <link rel="stylesheet" href="../css/attendance.css">
</head>
<body>

    <div class="app-layout">

        <div id="header"></div>

        <div class="app-body-container">

            <div id="sidebar"></div>

            <div id="content">

                <div class="page-header">
                    <div class="page-title">Leave Plan</div>
                    <div class="page-header-actions">
                        <button class="btn btn-primary" onclick="exportLeavePlanCsv()">⬇️ Export CSV</button>
                    </div>
                </div>

                <div class="att-links-row">
                    <a href="attendance.html">← Back to Attendance</a>
                </div>

                <div class="att-filter-bar">
                    <div class="att-field">
                        <label>From</label>
                        <input type="date" id="lpFromDate" onchange="renderLeavePlan()">
                    </div>
                    <div class="att-field">
                        <label>To</label>
                        <input type="date" id="lpToDate" onchange="renderLeavePlan()">
                    </div>
                    <div class="att-field">
                        <label>Type</label>
                        <select id="lpTypeFilter" onchange="renderLeavePlan()">
                            <option value="all">All</option>
                            <option value="Leave">Leave only</option>
                            <option value="Holiday">Holidays only</option>
                        </select>
                    </div>
                </div>

                <table class="att-table">
                    <thead>
                        <tr><th>Date</th><th>Type</th><th>Details</th></tr>
                    </thead>
                    <tbody id="lpBody">
                        <tr><td colspan="3" class="wb-empty-state">Loading...</td></tr>
                    </tbody>
                </table>

            </div>
        </div>
        <div id="footer"></div>
    </div>

    <div id="fab"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/config.js"></script>
    <script src="../js/supabase.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/navigation.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/masters.js"></script>
    <script src="../js/leaveplan.js"></script>
    <script>initializeAppIcon();</script>

</body>
</html>
